# =============================================================================
# DPW Open Platform — Layer 01: Awareness
# =============================================================================
#
# PURPOSE
#   This layer is a state-specific benefit program catalog. When called, a
#   registered app returns the benefit programs available in its state,
#   optionally filtered by program type or applicant context. Benne (the AI
#   Benefits Social Worker) calls this layer at the start of every session to
#   ground its responses in real, state-specific program data rather than
#   training data.
#
# MENTAL MODEL
#
#   User → Benne → Platform → [Iowa Outreach Platform]  (registered for IA)
#                           → [Ohio Benefits Notifier]  (registered for OH)
#
#   Each registered app is a catalog of one or more states' benefit programs.
#   The platform routes to the right app based on state_code. Multiple apps
#   can cover different states for the same layer — they never overlap on
#   the same state.
#
# INTEGRATION PATTERN
#   The DPW platform will POST to your registered /invoke endpoint.
#   Your service must return the response body described below.
#
# CONTRACT VERSION
#   version: "2.0"
#
# =============================================================================

version: "2.0"

layer:
  id: 1
  name: awareness
  description: >
    State-specific benefit program catalog. Returns available programs for a
    given state so that Benne (or any caller) can present accurate, grounded
    information to applicants without relying on training data.

# -----------------------------------------------------------------------------
# REQUEST SCHEMA
# Posted by the DPW platform to: POST /invoke
# -----------------------------------------------------------------------------
request:
  description: >
    Payload sent by the DPW platform requesting the benefit program catalog
    for a given state. Optionally filtered by program codes or applicant
    context.
  schema:
    type: object
    required:
      - case_id
      - state_code
      - layer_id
    properties:

      case_id:
        type: string
        description: >
          Globally unique identifier for this case within the DPW platform.
          Echo this value in every response.
        example: "CASE-2026-IA-00041872"

      state_code:
        type: string
        description: >
          Two-letter state code identifying the state whose programs to return.
        minLength: 2
        maxLength: 2
        example: "IA"

      layer_id:
        type: integer
        description: Always 1 for this layer.
        enum: [1]
        example: 1

      program_filter:
        type: array
        description: >
          Optional list of program codes to filter results. If omitted or empty,
          return all programs your app covers for this state.
        items:
          type: string
        example:
          - "SNAP"
          - "MEDICAID"

      context:
        type: object
        description: >
          Optional applicant context that your app may use to rank or filter
          results. All fields are optional — handle gracefully if absent.
        required: false
        properties:
          household_size:
            type: integer
            example: 3
          has_children:
            type: boolean
            example: true
          approximate_income:
            type: string
            description: Income range hint, e.g. "0-20000"
            example: "0-20000"
          age_range:
            type: string
            description: Applicant age range, e.g. "25-34"
            example: "25-34"
        additionalProperties: true

  example:
    case_id: "CASE-2026-IA-00041872"
    state_code: "IA"
    layer_id: 1
    program_filter: []
    context:
      household_size: 3
      has_children: true

# -----------------------------------------------------------------------------
# RESPONSE SCHEMA
# Returned by the 3rd party service from POST /invoke
# -----------------------------------------------------------------------------
response:
  description: >
    Return the benefit programs available in the requested state. Always
    return HTTP 200 — use status="not_found" for states with no programs,
    not HTTP 404.
  schema:
    type: object
    required:
      - case_id
      - status
      - message
      - programs
    properties:

      case_id:
        type: string
        description: Echo from request.
        example: "CASE-2026-IA-00041872"

      status:
        type: string
        description: >
          Outcome of the catalog lookup.
            found       — One or more programs returned.
            not_found   — No programs match the request (empty programs list).
            error       — App encountered an internal error.
        enum:
          - found
          - not_found
          - error
        example: "found"

      message:
        type: string
        description: Human-readable summary for caseworkers and Benne.
        example: "Found 6 benefit programs available in Iowa."

      programs:
        type: array
        description: >
          List of benefit programs available in this state. Empty array when
          status is not_found or error.
        items:
          type: object
          required:
            - code
            - name
            - description
          properties:
            code:
              type: string
              description: Program code used in downstream layer calls (e.g. Layer 2 Application).
              example: "SNAP"
            name:
              type: string
              description: Full human-readable program name.
              example: "Supplemental Nutrition Assistance Program"
            description:
              type: string
              description: >
                Plain-language description of what the program provides.
                Written for applicants, not caseworkers.
              example: "Helps low-income households pay for groceries through an EBT card."
            eligibility_hint:
              type: string
              description: >
                Brief, plain-language eligibility summary. Not a legal
                determination — used by Benne to set expectations before
                the full eligibility check (Layer 9).
              required: false
              example: "Generally available to households earning below 130% of the federal poverty level."
            how_to_apply:
              type: string
              description: Brief instructions or URL for starting an application.
              required: false
              example: "Apply online at dhs.iowa.gov or in person at your local DHS office."
            program_url:
              type: string
              description: Official state program page URL.
              required: false
              example: "https://dhs.iowa.gov/food-assistance"

  examples:
    found:
      case_id: "CASE-2026-IA-00041872"
      status: "found"
      message: "Found 3 benefit programs available in Iowa."
      programs:
        - code: "SNAP"
          name: "Supplemental Nutrition Assistance Program"
          description: "Helps low-income households pay for groceries through an EBT card."
          eligibility_hint: "Generally available to households earning below 130% of the federal poverty level."
          how_to_apply: "Apply online at dhs.iowa.gov or call 1-877-347-5678."
          program_url: "https://dhs.iowa.gov/food-assistance"
        - code: "MEDICAID"
          name: "Iowa Health & Wellness Plan"
          description: "Free or low-cost health coverage for adults and families."
          eligibility_hint: "Available to adults aged 19-64 earning up to 133% of the federal poverty level."
          how_to_apply: "Apply at dhs.iowa.gov or through Healthcare.gov."
          program_url: "https://dhs.iowa.gov/ime/members/medicaid-a-to-z/hh"
        - code: "CHIP"
          name: "hawk-i (Healthy and Well Kids in Iowa)"
          description: "Low-cost health coverage for children in families that earn too much for Medicaid."
          eligibility_hint: "Available for children under 19 in households earning up to 302% of the federal poverty level."
          how_to_apply: "Apply at dhs.iowa.gov or call 1-800-257-8563."
          program_url: "https://dhs.iowa.gov/hawki"

    not_found:
      case_id: "CASE-2026-IA-00041873"
      status: "not_found"
      message: "No programs found matching the requested filter."
      programs: []

# -----------------------------------------------------------------------------
# IMPLEMENTATION NOTES FOR 3RD PARTY DEVELOPERS
# -----------------------------------------------------------------------------
notes:
  - >
    Your app is a catalog for one or more states. Register it for each state
    you cover. The platform routes requests to the correct app based on
    state_code.
  - >
    program_filter is optional. If absent, return all programs you have data
    for in the requested state. If present, filter to only the requested codes.
  - >
    context is optional and may be absent entirely. Never require it — use it
    only to rank or filter results when present.
  - >
    Keep descriptions in plain language. Benne reads these directly to
    applicants. Avoid jargon, acronyms without explanation, and legal disclaimers.
  - >
    eligibility_hint is informational only. The actual eligibility determination
    happens in Layer 9. Do not make binding determinations here.
  - >
    Respond within the platform SLA (default: 30 seconds). For large catalogs,
    cache aggressively — this endpoint is called at the start of every Benne
    session.
